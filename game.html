<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Tools - تفاصيل ملف</title>
<link rel="icon" type="image/png" href="storecon.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#121212;--surface:#1a1a1a;--surface2:#242424;--surface3:#2a2a2a;
  --accent:#ac4d00;--accent-h:#181818e5;
  --text:#ffffff;--text2:#8f8f8f;--text3:#4a4a4a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);
  --success:#00e676;--error:#ff4757;--gold:#f5c518;
}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}
a{text-decoration:none;color:inherit;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:56px;
  background:rgba(14,15,17,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.nav-logo::before{content:'';width:28px;height:28px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:block;}
.nav-links{display:flex;align-items:center;gap:8px;}
.nav-links a{padding:8px 16px;border-radius:6px;font-size:14px;font-weight:600;color:var(--text2);transition:.2s;}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.06);}
.nav-cta{background:var(--accent);color:#fff!important;padding:9px 22px;border-radius:6px;font-size:14px;font-weight:700;}
.nav-cta:hover{background:#0088ff!important;}

/* HERO */
.game-hero{
  margin-top:56px;
  min-height:560px;
  position:relative;overflow:hidden;
  display:flex;
  align-items:flex-end;
}
.hero-backdrop{
  position:absolute;inset:0;
  background:#060810;
  z-index:0;
}
.hero-img-blur{ display:none; }
.hero-img-main{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  z-index:1;
}
.hero-img-wrap{
  position:absolute;inset:0;
  overflow:hidden;
}
.hero-img-wrap::before{
  content:'';
  position:absolute;inset:0;
  background:
    linear-gradient(to top, var(--bg) 0%, rgba(14,15,17,0.8) 35%, rgba(14,15,17,0.1) 100%),
    linear-gradient(to right, rgba(14,15,17,0.95) 0%, rgba(14,15,17,0.5) 50%, transparent 80%);
  z-index:2;
  pointer-events:none;
}
.hero-overlay{display:none;}
.hero-content{
  position:relative;z-index:3;
  padding:56px 48px;
  width:100%;
  max-width:660px;
  padding-bottom:52px;
}

.breadcrumb{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--text3);margin-bottom:20px;
}
.breadcrumb a{color:var(--text2);transition:.2s;}
.breadcrumb a:hover{color:var(--accent2);}
.breadcrumb span{color:var(--text3);}

.game-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:4px;margin-bottom:16px;
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
}
.game-badge.steam{background:rgba(102,192,244,0.1);color:#66c0f4;border:1px solid rgba(102,192,244,0.25);}
.game-badge.torrent{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.25);}

h1{
  font-family:'Rajdhani',sans-serif;
  font-size:52px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:16px;
}

.game-desc{font-size:16px;color:var(--text2);line-height:1.8;margin-bottom:28px;max-width:480px;}

.meta-row{display:flex;gap:24px;margin-bottom:32px;}
.meta-item label{display:block;font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.meta-item span{font-size:15px;font-weight:600;color:var(--text);}

.price-block{display:flex;align-items:center;gap:20px;}
.price-tag{
  font-family:'Rajdhani',sans-serif;
  font-size:48px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.buy-now{
  background:var(--accent);color:#fff;border:none;
  padding:16px 40px;border-radius:8px;
  font-size:16px;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;transition:.25s;letter-spacing:.5px;
  display:inline-flex;align-items:center;gap:10px;
}
.buy-now:hover{background:#0088ff;transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,116,228,0.4);}
.buy-now:disabled{background:#333;color:#666;cursor:not-allowed;transform:none;}

/* GALLERY */
.gallery-section{padding:40px 48px;border-top:1px solid var(--border);}
.gallery-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:.5px;margin-bottom:16px;color:var(--text2);}
.gallery{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;}
.gallery::-webkit-scrollbar{height:4px;}
.gallery::-webkit-scrollbar-track{background:var(--surface);}
.gallery::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
.gallery img{
  width:160px;height:90px;object-fit:cover;border-radius:6px;
  cursor:pointer;flex-shrink:0;
  border:2px solid transparent;transition:.2s;
  filter:brightness(.7);
}
.gallery img:hover,.gallery img.active{border-color:var(--accent);filter:brightness(1);}

/* INFO PANEL */
.info-section{
  display:grid;grid-template-columns:1fr 320px;gap:0;
  border-top:1px solid var(--border);
}
.info-main{padding:40px 48px;}
.info-main h2{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.info-main h2::before{content:'';width:3px;height:20px;background:linear-gradient(var(--accent),var(--accent2));border-radius:2px;}
.info-main p{color:var(--text2);line-height:1.9;font-size:15px;}

.info-sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  padding:32px 28px;
}
.sidebar-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--border);
}
.sidebar-row:last-child{border-bottom:none;}
.sidebar-label{font-size:13px;color:var(--text3);font-weight:600;}
.sidebar-val{font-size:14px;font-weight:700;color:var(--text);}

/* LIGHTBOX */
.lightbox{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);
  pointer-events:none;
  transition:background .3s,backdrop-filter .3s;
}
.lightbox.open{
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(12px);
  pointer-events:all;
}
.lightbox-inner{
  position:relative;
  max-width:90vw;max-height:85vh;
  transform:scale(0.88);opacity:0;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;
}
.lightbox.open .lightbox-inner{
  transform:scale(1);opacity:1;
}
.lightbox-inner img{
  display:block;
  max-width:90vw;max-height:82vh;
  width:auto;height:auto;
  border-radius:10px;
  box-shadow:0 32px 80px rgba(0,0,0,0.7);
  border:1px solid rgba(255,255,255,0.1);
}
.lightbox-close{
  position:absolute;top:-16px;right:-16px;
  width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:20px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.2s;
}
.lightbox-close:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.lightbox-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.2s;backdrop-filter:blur(8px);
}
.lightbox-nav:hover{background:var(--accent);border-color:var(--accent);}
.lightbox-prev{left:-60px;}
.lightbox-next{right:-60px;}
.lightbox-counter{
  position:absolute;bottom:-36px;left:50%;transform:translateX(-50%);
  font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:1px;
}

/* FOOTER */
footer{background:var(--surface);border-top:1px solid var(--border);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;margin-top:60px;}
.footer-logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;color:var(--text2);}
.footer-copy{font-size:13px;color:var(--text3);}

@media(max-width:768px){
  nav{padding:0 20px;}
  .game-hero{min-height:420px;align-items:flex-end;}
  .hero-img-wrap::before{
    background:
      linear-gradient(to top, var(--bg) 0%, rgba(14,15,17,0.85) 50%, rgba(14,15,17,0.2) 100%);
  }
  .hero-content{width:100%;padding:28px 20px 40px;max-width:100%;}
  h1{font-size:32px;}
  .gallery-section{padding:24px 20px;}
  .info-section{grid-template-columns:1fr;}
  .info-sidebar{border-right:none;border-top:1px solid var(--border);}
  .info-main{padding:28px 20px;}
  footer{flex-direction:column;gap:12px;text-align:center;padding:20px;}
}

/* ── TOPBAR Epic ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:56px;background:#1a1a1a;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;
  transition:box-shadow .2s;
}
.topbar-logo{
  display:flex;align-items:center;gap:10px;
  padding-left:20px;margin-left:16px;
  border-left:1px solid var(--border);height:56px;
}
.logo-icon{
  width:32px;height:32px;background:var(--accent);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  flex-shrink:0;
}
.logo-text{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:1.5px;}
.topbar-nav{display:flex;align-items:center;gap:2px;flex:1;margin-right:8px;}
.topbar-nav a{
  height:56px;display:flex;align-items:center;gap:7px;
  padding:0 14px;font-size:13px;font-weight:600;color:var(--text2);
  border-bottom:2px solid transparent;transition:.15s;text-decoration:none;color:var(--text2);
}
.topbar-nav a:hover{color:var(--text);}
.topbar-nav a.active{color:var(--text);border-bottom-color:var(--accent);}
.topbar-right{margin-right:auto;}
.btn-account{
  background:var(--accent);color:#fff !important;
  padding:7px 18px;border-radius:4px;
  font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;
  transition:.15s;text-decoration:none;
}
.btn-account:hover{background:var(--accent-h) !important;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
</style>
</head>
<body>

<header class="topbar" id="topbar">
  <div class="topbar-logo">
    <div class="logo-icon"></div>
    <span class="logo-text">Steam Tools</span>
  </div>
  <nav class="topbar-nav">
    <a href="index.html" class="active">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      المتجر
    </a>
    <a href="library.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      مكتبتي
    </a>
  </nav>
  <div class="topbar-right">
    <a href="auth.html" id="accountLink" class="btn-account">حسابي</a>
  </div>
</header>

<!-- HERO -->
<div class="game-hero">
  <div class="hero-backdrop"></div>
  <div class="hero-img-wrap">
    <img class="hero-img-main" id="mainImg" src="" alt="">
  </div>
  <div class="hero-content">
    <div class="breadcrumb">
      <a href="index.html">المتجر</a>
      <span>›</span>
      <span id="breadName">...</span>
    </div>
    <div class="game-badge" id="gameBadge"></div>
    <h1 id="gameName">جاري التحميل...</h1>
    <p class="game-desc" id="gameDesc"></p>
    <div class="meta-row">

      <div class="meta-item">
        <label>الحجم</label>
        <span id="metaSize">—</span>
      </div>
    </div>
    <div class="price-block">
      <button class="buy-now" id="buyBtn">
        إضافة إلى المكتبة
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery-section">
  <div class="gallery-title">معرض الصور</div>
  <div class="gallery" id="gallery"></div>
</div>

<!-- INFO PANEL -->
<div class="info-section">
  <div class="info-main">
    <h2>عن ملف</h2>
    <p id="fullDesc">جاري التحميل...</p>
  </div>
  <div class="info-sidebar">
    <div class="sidebar-row">
      <span class="sidebar-label">النوع</span>
      <span class="sidebar-val" id="siCategory">—</span>
    </div>
    <div class="sidebar-row">
      <span class="sidebar-label">الحجم</span>
      <span class="sidebar-val" id="siSize">—</span>
    </div>

  </div>
</div>

<footer>
  <div class="footer-logo">Steam Tools</div>
  <div class="footer-copy">&copy; 2026 Steam Tools</div>
</footer>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>
</div>

<script>
const uid = localStorage.getItem("uid");
const accountLink = document.getElementById("accountLink");
if(uid){ accountLink.href="profile.html"; }

const id = new URLSearchParams(location.search).get("id");

db.ref("games/"+id).once("value").then(snap=>{
  const g = snap.val();
  if(!g){ alert("ملف غير موجودة"); location="index.html"; return; }

  document.title = g.name + " - Steam Tools";
  document.getElementById("gameName").textContent = g.name;
  document.getElementById("breadName").textContent = g.name;
  document.getElementById("gameDesc").textContent = g.description ? g.description.substring(0,120)+"..." : "";
  document.getElementById("fullDesc").textContent = g.description || "";

  document.getElementById("metaSize").textContent = g.size || "—";

  const badge = document.getElementById("gameBadge");
  badge.textContent = g.category==="steam" ? "تطبيقات" : "لعبة";
  badge.className = "game-badge " + (g.category==="steam"?"steam":"torrent");

  document.getElementById("siCategory").textContent = g.category==="steam"?"تطبيقات":"لعبة";
  document.getElementById("siSize").textContent = g.size || "—";


  const img = g.coverImage || g.image || "";
  document.getElementById("mainImg").src = img;

  // Gallery
  const gallery = document.getElementById("gallery");
  const allImgs = [img];
  if(g.images) Object.values(g.images).forEach(s=>{ if(s && s!==img) allImgs.push(s); });

  allImgs.forEach((src,i)=>{
    const el = document.createElement("img");
    el.src = src;
    if(i===0) el.classList.add("active");
    el.onclick = ()=>{
      document.getElementById("mainImg").src = src;
      gallery.querySelectorAll("img").forEach(x=>x.classList.remove("active"));
      el.classList.add("active");
      openLightbox(i);
    };
    gallery.appendChild(el);
  });
  window._galleryImgs = allImgs;
});

document.getElementById("buyBtn").addEventListener("click",()=>{
  if(!uid){ alert("يجب تسجيل الدخول أولاً"); location="auth.html"; return; }

  const btn = document.getElementById("buyBtn");
  btn.disabled = true;
  btn.textContent = "جاري الإضافة...";

  db.ref("usersperfect/"+uid).once("value").then(uSnap=>{
    const user = uSnap.val();

    // already owned
    if(user.gamesOwned && user.gamesOwned[id]){
      alert("هذا الملف موجود مسبقاً في مكتبتك ✅");
      location = "library.html";
      return;
    }

    db.ref("games/"+id).once("value").then(gSnap=>{
      const game = gSnap.val();

      if(user.balance < game.price){
        alert("رصيد غير كافي 💳\nرصيدك: "+user.balance+"$ | سعر الملف: "+game.price+"$");
        btn.disabled = false;
        btn.innerHTML = 'إضافة إلى المكتبة <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
        return;
      }

      // deduct balance
      db.ref("usersperfect/"+uid).update({ balance: user.balance - game.price });

      // add to library
      db.ref("usersperfect/"+uid+"/gamesOwned/"+id).set({
        purchasedAt: Date.now()
      });

      // log order
      db.ref("orders").push({
        user: uid,
        game: id,
        price: game.price,
        date: Date.now()
      });

      alert("تمت الإضافة إلى مكتبتك ✅");
      location = "library.html";
    });
  }).catch(err=>{
    alert("حدث خطأ، حاول مرة أخرى");
    btn.disabled = false;
    btn.innerHTML = 'إضافة إلى المكتبة <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  });
});

// LIGHTBOX
let _lbIndex = 0;
let _lb, _lbImg, _lbCounter;

function openLightbox(index){
  const imgs = window._galleryImgs || [];
  if(!imgs.length) return;
  _lbIndex = index;
  _lbImg.src = imgs[_lbIndex];
  _lbCounter.textContent = (_lbIndex+1) + " / " + imgs.length;
  _lb.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox(){
  _lb.classList.remove("open");
  document.body.style.overflow = "";
}

function lbNav(dir){
  const imgs = window._galleryImgs || [];
  _lbIndex = (_lbIndex + dir + imgs.length) % imgs.length;
  _lbImg.style.opacity = "0";
  setTimeout(()=>{
    _lbImg.src = imgs[_lbIndex];
    _lbCounter.textContent = (_lbIndex+1) + " / " + imgs.length;
    _lbImg.style.opacity = "1";
  }, 150);
}

window.addEventListener("DOMContentLoaded", ()=>{
  _lb = document.getElementById("lightbox");
  _lbImg = document.getElementById("lightboxImg");
  _lbCounter = document.getElementById("lightboxCounter");
  _lbImg.style.transition = "opacity .15s";

  document.getElementById("lightboxClose").onclick = closeLightbox;
  document.getElementById("lightboxPrev").onclick = ()=> lbNav(-1);
  document.getElementById("lightboxNext").onclick = ()=> lbNav(1);
  _lb.addEventListener("click", e=>{ if(e.target === _lb) closeLightbox(); });

  document.addEventListener("keydown", e=>{
    if(!_lb.classList.contains("open")) return;
    if(e.key === "Escape") closeLightbox();
    if(e.key === "ArrowLeft") lbNav(1);
    if(e.key === "ArrowRight") lbNav(-1);
  });

  const mainImg = document.getElementById("mainImg");
  mainImg.style.cursor = "zoom-in";
  mainImg.addEventListener("click",()=>{
    const imgs = window._galleryImgs || [];
    const idx = imgs.findIndex(s => mainImg.src.endsWith(s) || s === mainImg.src);
    openLightbox(idx >= 0 ? idx : 0);
  });
});
</script>
</body>
</html>
