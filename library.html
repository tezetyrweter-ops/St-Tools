<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبتي - Steam Tools</title>
<link rel="icon" type="image/png" href="storecon.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#1c1c1e;
  --sidebar:#141416;
  --surface:#252527;
  --surface2:#2e2e30;
  --surface3:#3a3a3c;
  --accent:#0400e4;
  --text:#ffffff;
  --text2:#8e8e93;
  --text3:#48484a;
  --border:rgba(255,255,255,0.07);
  --success:#30d158;
}

html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Cairo',sans-serif;
  display:flex;
  flex-direction:column;
  direction:ltr;
}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}

/* ── TOP BAR ── */
.topbar{
  height:52px;
  background:var(--sidebar);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;
  flex-shrink:0;
  z-index:100;
  gap:16px;
}
.topbar-logo{
  display:flex;align-items:center;gap:8px;
  padding-right:16px;
  border-right:1px solid var(--border);
  height:52px;
}
.logo-text{
  font-family:'Rajdhani',sans-serif;
  font-size:16px;font-weight:700;letter-spacing:1.5px;
}
.topbar-search{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px;
  padding:7px 14px;
  width:240px;
  transition:border-color .2s;
  margin-left:auto;
}
.topbar-search:focus-within{border-color:rgba(255,255,255,0.2);}
.topbar-search input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;
  flex:1;direction:rtl;
}
.topbar-search input::placeholder{color:var(--text3);}
.topbar-search svg{color:var(--text3);}

/* ── LAYOUT ── */
.layout{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;
  flex-shrink:0;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  padding:16px 0;
}
.sidebar-nav{
  display:flex;flex-direction:column;
  gap:2px;
  padding:0 10px;
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:9px 12px;
  border-radius:4px;
  font-size:13px;font-weight:600;
  color:var(--text2);
  cursor:pointer;
  transition:background .15s,color .15s;
  text-decoration:none;
  direction:rtl;
}
.nav-item:hover{background:var(--surface);color:var(--text);}
.nav-item.active{background:var(--surface2);color:var(--text);}
.nav-item svg{flex-shrink:0;}

.sidebar-spacer{flex:1;}
.sidebar-bottom{
  padding:10px;
  display:flex;flex-direction:column;gap:2px;
}

/* ── MAIN ── */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── TOOLBAR ── */
.lib-toolbar{
  height:52px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 24px;
  gap:16px;
  flex-shrink:0;
  direction:rtl;
}
.toolbar-group{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--text2);
}
.toolbar-select{
  background:none;border:none;
  color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;padding:4px 8px;border-radius:3px;
  transition:background .15s;
}
.toolbar-select:hover{background:var(--surface);}
.toolbar-sep{width:1px;height:20px;background:var(--border);}
.toolbar-right{
  margin-right:auto;
  display:flex;align-items:center;gap:6px;
}
.view-btn{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;background:none;border:none;
  color:var(--text3);cursor:pointer;transition:.15s;
}
.view-btn:hover{background:var(--surface);color:var(--text2);}
.view-btn.active{background:var(--surface2);color:var(--text);}

/* ── GAMES AREA ── */
.games-area{
  flex:1;
  overflow-y:auto;
  padding:24px 28px;
}

/* ── GAME CARDS — Epic portrait 2:3 ── */
#library-container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:18px;
}

.lib-card{
  cursor:pointer;
  border-radius:4px;
  overflow:hidden;
  transition:transform .2s;
  position:relative;
}
.lib-card:hover{transform:translateY(-3px);}

/* 2:3 portrait ratio */
.lib-card-img-wrap{
  position:relative;
  aspect-ratio:2/3;
  background:var(--surface);
  overflow:hidden;
  border-radius:4px;
}
.lib-card-img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform .3s;
}
.lib-card:hover .lib-card-img{transform:scale(1.04);}

/* Hover overlay */
.lib-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.2) 50%,transparent 100%);
  opacity:0;transition:opacity .2s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:12px 10px;
}
.lib-card:hover .lib-card-overlay{opacity:1;}

.overlay-btn{
  width:100%;
  background:var(--accent);color:#fff;border:none;
  padding:9px;border-radius:3px;
  font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s;
  direction:rtl;
}
.overlay-btn:hover{background:#2b2b2b;}

/* More (...) */
.card-more{
  position:absolute;top:8px;right:8px;
  width:26px;height:26px;
  background:rgba(0,0,0,0.65);
  border-radius:3px;border:none;
  color:#fff;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  font-size:13px;letter-spacing:1px;
}
.lib-card:hover .card-more{display:flex;}

/* Card footer */
.lib-card-footer{
  padding:8px 4px 0;
  direction:rtl;
}
.lib-card-name{
  font-size:13px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:4px;
}
.lib-card-action{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:var(--text2);
}

/* ── SKELETON ── */
@keyframes shimmer{
  0%{background-position:200% 0;}100%{background-position:-200% 0;}
}
.skeleton-wrap{
  aspect-ratio:2/3;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:4px;
}

/* ── EMPTY ── */
.empty{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;
  padding:80px 20px;
  text-align:center;
  direction:rtl;
}
.empty-icon{
  width:68px;height:68px;
  background:var(--surface);border:1px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;
}
.empty h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--text2);margin-bottom:22px;}
.browse-btn{
  background:var(--accent);color:#fff;border:none;
  padding:10px 26px;border-radius:3px;
  font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;letter-spacing:.5px;
  transition:background .15s;
}
.browse-btn:hover{background:#0088ff;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <svg width="28" height="28" viewBox="0 0 30 30" fill="none">
      <path d="M15 1L3 7V17C3 23 8.5 27.5 15 29C21.5 27.5 27 23 27 17V7L15 1Z" fill="#252527" stroke="white" stroke-width="1.5"/>
      <text x="15" y="14" text-anchor="middle" font-family="Rajdhani" font-size="5.5" font-weight="700" fill="white">STEAM</text>
      <text x="15" y="20.5" text-anchor="middle" font-family="Rajdhani" font-size="3.5" font-weight="600" fill="white" letter-spacing="0.5">TOOLS</text>
      <path d="M15 24L13 22.5H17L15 24Z" fill="white" opacity="0.8"/>
    </svg>
    <span class="logo-text">Steam Tools</span>
  </div>

  <div class="topbar-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="ابحث في مكتبتك..." id="searchInput" oninput="filterLib()">
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-nav">
      <a class="nav-item" href="index.html">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Home
      </a>
      <a class="nav-item active" href="library.html">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        Library
      </a>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-bottom">
      <a class="nav-item" href="profile.html">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
        Profile
      </a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Toolbar -->
    <div class="lib-toolbar">
      <div class="toolbar-group">
        <span>:Sort by</span>
        <button class="toolbar-select">Recent ▾</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <span>:Filter</span>
        <button class="toolbar-select">All ▾</button>
      </div>
      <div class="toolbar-right">
        <button class="view-btn active" title="Grid" onclick="setView('grid',this)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="9" y="0" width="6" height="6" rx="1"/><rect x="0" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button class="view-btn" title="List" onclick="setView('list',this)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor"><rect x="0" y="1" width="15" height="2" rx="1"/><rect x="0" y="6" width="15" height="2" rx="1"/><rect x="0" y="11" width="15" height="2" rx="1"/></svg>
        </button>
      </div>
    </div>

    <!-- Games -->
    <div class="games-area">
      <div id="library-container"></div>
    </div>

  </div>
</div>

<script>
// ── لا نستخدم library.js لأنه يكتب في عنصر قديم ──
const uid = localStorage.getItem("uid");
if(!uid){ alert("يجب تسجيل الدخول"); location="auth.html"; }

let allCards = [];

/* ── Skeletons ── */
function showSkeletons(n){
  const c = document.getElementById("library-container");
  c.innerHTML = "";
  for(let i=0;i<n;i++){
    const sk = document.createElement("div");
    sk.innerHTML = `<div class="skeleton-wrap"></div>
      <div style="padding:8px 4px 0">
        <div style="height:12px;background:var(--surface);border-radius:3px;margin-bottom:5px;width:75%;"></div>
        <div style="height:11px;background:var(--surface);border-radius:3px;width:45%;"></div>
      </div>`;
    c.appendChild(sk);
  }
}
showSkeletons(12);

/* ── Load games ── */
db.ref("usersperfect/"+uid+"/gamesOwned").once("value").then(snapshot=>{
  const container = document.getElementById("library-container");

  if(!snapshot.exists()||!snapshot.hasChildren()){
    container.innerHTML=`<div class="empty">
      <div class="empty-icon"><svg width="28" height="28" fill="none" stroke="var(--text3)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
      <h3>مكتبتك فارغة</h3>
      <p>لم تشترِ أي منتج بعد. اكتشف متجرنا!</p>
      <button class="browse-btn" onclick="location.href='index.html'">تصفح المتجر</button>
    </div>`;
    return;
  }

  container.innerHTML = "";
  const promises = [];

  snapshot.forEach(gSnap=>{
    const gameId = gSnap.key;
    const owned  = gSnap.val();
    const p = db.ref("games/"+gameId).once("value").then(s=>{
      const game = s.val();
      if(!game) return;

      const card = document.createElement("div");
      card.className = "lib-card";
      card.dataset.name = (game.name||"").toLowerCase();

      const fileName = (game.fileName||"").replace(/'/g,"\\'");

      card.innerHTML = `
        <div class="lib-card-img-wrap">
          <img class="lib-card-img"
               src="${game.coverImage||game.image||''}"
               alt="${game.name}"
               loading="lazy"
               onerror="this.style.background='#222'">
          <div class="lib-card-overlay">
            <button class="overlay-btn" onclick="event.stopPropagation();dlGame('${fileName}')">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>
              تحميل
            </button>
          </div>
          <button class="card-more">···</button>
        </div>
        <div class="lib-card-footer">
          <div class="lib-card-name">${game.name}</div>
          <div class="lib-card-action">
            <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span>Launch</span>
          </div>
        </div>`;

      card.addEventListener("click",()=>dlGame(game.fileName||""));
      container.appendChild(card);
      allCards.push(card);
    });
    promises.push(p);
  });
});

function dlGame(fileName){
  if(!fileName){ alert("ملف التحميل غير موجود"); return; }
  window.location.href = "Games/"+fileName;
}

/* ── Search ── */
function filterLib(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  allCards.forEach(c=>{
    c.style.display = c.dataset.name.includes(q)?"":"none";
  });
}

/* ── View toggle ── */
function setView(view, btn){
  document.querySelectorAll(".view-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const container = document.getElementById("library-container");
  if(view==="list"){
    container.style.cssText="display:flex;flex-direction:column;gap:6px;";
    allCards.forEach(c=>{
      c.style.cssText="display:flex;align-items:center;gap:14px;padding:10px 14px;background:var(--surface);border-radius:4px;transform:none;cursor:pointer;";
      const wrap = c.querySelector(".lib-card-img-wrap");
      if(wrap) wrap.style.cssText="width:50px;height:50px;aspect-ratio:1;flex-shrink:0;border-radius:4px;overflow:hidden;";
      const overlay = c.querySelector(".lib-card-overlay");
      if(overlay) overlay.style.display="none";
    });
  } else {
    container.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:18px;";
    allCards.forEach(c=>{
      c.style.cssText="cursor:pointer;border-radius:4px;overflow:hidden;transition:transform .2s;position:relative;";
      const wrap = c.querySelector(".lib-card-img-wrap");
      if(wrap) wrap.style.cssText="position:relative;aspect-ratio:2/3;background:var(--surface);overflow:hidden;border-radius:4px;";
      const overlay = c.querySelector(".lib-card-overlay");
      if(overlay) overlay.style.display="";
    });
  }
}
</script>
</body>
</html>
